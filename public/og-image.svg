  <text x="600" y="450" font-size="24" text-anchor="middle" fill="#999999" font-family="Arial, sans-serif">
    Jakarta, Indonesia
  </text>
  
  <!-- Website URL -->
  <text x="600" y="550" font-size="20" text-anchor="middle" fill="#5C6CFF" font-family="Arial, sans-serif">
